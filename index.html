        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                unmuteBtn.classList.add('hidden');

        function addMessage() {
            const nome = nomes[Math.floor(Math.random() * nomes.length)];
            const msg = mensagens[Math.floor(Math.random() * mensagens.length)];
            const div = document.createElement('div');
            div.className = 'animate__animated animate__fadeInUp bg-white/5 p-2 rounded-lg';
            div.innerHTML = `<span class="text-pink-500 font-bold text-[11px]">@${nome.toLowerCase()}</span><p class="text-sm text-gray-200 leading-tight">${msg}</p>`;
            chatBox.prepend(div);
            if (chatBox.childNodes.length > 25) chatBox.removeChild(chatBox.lastChild);
        }

        function updateViewers() {
            let current = parseInt(viewerCount.innerText.replace('.', ''));
            let change = Math.floor(Math.random() * 20) - 10;
            viewerCount.innerText = (current + change).toLocaleString('pt-BR');
        }

        // Lógica de Checkout e Integração
        async function iniciarCheckout(btn) {
            if(btn) {
                btn.innerHTML = `<span class="animate-pulse">PROCESSANDO...</span>`;
                btn.disabled = true;
            }

            try {
                // 1. Notifica o n8n sobre o clique (Gera Lead/Pix)

                        url_entrega: 'https://alana-valentine.vercel.app/'

                }, 1500);

            } catch (e) {
