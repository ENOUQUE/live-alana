            divResp.className = 'animate__animated animate__fadeInUp animate__faster drop-shadow-[0_2px_5px_rgba(0,0,0,0.9)] pb-1 pt-0.5 w-full break-words';
            divResp.innerHTML = `<span class="inline-flex items-center gap-0.5 text-pink-400 font-extrabold text-[12px] mr-1 bg-black/30 px-1.5 py-0.5 rounded-md border border-pink-500/30 shadow-inner">👑 Carol <svg class="w-3 h-3 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg></span> <span class="text-[13px] text-pink-50 font-bold drop-shadow-md leading-tight">${mensagem}</span>`;
            chatBox.prepend(divResp);
            if (chatBox.childNodes.length > 25) chatBox.removeChild(chatBox.lastChild);
        }

        // Simulador de corações igual nas lives oficiais
        function enviarCurtiu() {
            const wrapper = document.getElementById('chat-box').parentElement;
            const heart = document.createElement('div');
            heart.innerHTML = "❤️";
            heart.className = "absolute bottom-20 right-6 text-3xl animate__animated animate__fadeOutUp animate__slow z-[60] pointer-events-none drop-shadow-[0_0_10px_rgba(236,72,153,0.8)]";
            wrapper.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        let meuNome = "";
        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if (!txt) return;

            if (!meuNome) {
                meuNome = prompt("Como você quer ser chamado na live?");
                if (!meuNome) meuNome = "Visitante";
            }

            const div = document.createElement('div');
            div.className = 'animate__animated animate__fadeInUp animate__faster text-white drop-shadow-[0_1px_4px_rgba(0,0,0,0.9)] pb-0.5 leading-tight w-full break-words';
            div.innerHTML = `<span class="text-pink-400 font-extrabold text-[12px] mr-1.5 drop-shadow-md tracking-tight">${meuNome.toLowerCase()} (Você):</span><span class="text-[13px] text-pink-100 font-medium drop-shadow-lg">${txt}</span>`;
            chatBox.prepend(div);
            
            if (chatBox.childNodes.length > 25) chatBox.removeChild(chatBox.lastChild);
            
            input.value = "";

            // Carolzinha responde diretamente ao usuário principal quando ele manda mensagem
            setTimeout(() => {
                const respostasCarol = [
                    `@${meuNome.toLowerCase()}, aaaah que tudo ter você interagindo comigo! ❤️`,
                    `@${meuNome.toLowerCase()}, já viu os meus pacotes vips ali em cima? Estão um luxo bebê! 🔥 clica ali!`,
                    `@${meuNome.toLowerCase()}, sua presença já melhorou minha live! 😈 Vem pro VIP!`,
                    `Ai @${meuNome.toLowerCase()}, que delícia conversar com você rsrs`,
                    `@${meuNome.toLowerCase()}, quem sabe lá no grupo VIP eu não te respondo de um jeito diferente? 🌶️👀`
                ];
                const respostaAleatoria = respostasCarol[Math.floor(Math.random() * respostasCarol.length)];
                enviarRespostaCarolzinha(respostaAleatoria);
            }, 2500 + Math.random() * 2000);
        }

        function updateViewers() {
            let current = parseInt(viewerCount.innerText.replace('.', ''));
            let change = Math.floor(Math.random() * 20) - 10;
            viewerCount.innerText = (current + change).toLocaleString('pt-BR');
        }

        // Lógica de Checkout e Integração
        async function iniciarCheckout(btn) {
            if(btn) {
                btn.innerHTML = `<span class="animate-pulse">PROCESSANDO...</span>`;
                btn.disabled = true;
            }

            try {
                // 1. Notifica o n8n sobre o clique (Gera Lead/Pix)
                fetch('https://webhook.previas.shop/webhook/webhook-gerar-pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instancia: 'pluszap',
                        origem: 'Live_VIP_Hot',
                        url_entrega: 'https://alana-valentine.vercel.app/'
                    })
                });

                // 2. Pequeno delay para "fingir" processamento real
                setTimeout(() => {
                    // Redireciona para o gerador de PIX da EFI na Vercel
                    window.location.href = "https://carolvip.vercel.app/";
                }, 1500);

            } catch (e) {
                window.location.href = "https://carolvip.vercel.app/";
            }
        }

        setInterval(addMessage, 1800);
        setInterval(updateViewers, 3000);

        // POP-UP AP�S 12 SEGUNDOS
        let loopTimers = [];
        let isLooping = true; // Permite desativar loop quando clicado pelo usuario

        function togglePopup() {
            if (salePopup.classList.contains('hidden') || salePopup.classList.contains('animate__zoomOut')) {
                // Clique manual: abre e pausa o loop escondido
                isLooping = false;
                loopTimers.forEach(t => clearTimeout(t));
                salePopup.classList.remove('hidden', 'animate__zoomOut');
                salePopup.classList.add('animate__zoomIn');
            } else {
                fecharPopup();
            }
        }

        function fecharPopup() {
            salePopup.classList.replace('animate__zoomIn', 'animate__zoomOut');
            setTimeout(() => {
                salePopup.classList.add('hidden');
            }, 500); 
        }

        function popupLoop() {
            if(!isLooping) return;
            // Abre o pop-up
            if (salePopup.classList.contains('hidden') || salePopup.classList.contains('animate__zoomOut')) {
                salePopup.classList.remove('hidden', 'animate__zoomOut');
                salePopup.classList.add('animate__zoomIn');
            }
            
            // Fecha após 20 segundos
            let t1 = setTimeout(() => {
                if(isLooping) fecharPopup();
                
                // Recomeça ciclo após 35 segundos fechado
                let t2 = setTimeout(() => {
                    popupLoop();
                }, 35000);
                loopTimers.push(t2);
            }, 20000);
            loopTimers.push(t1);
        }

        // Mascara de telefone
        function mascaraTelefone(input) {
            let val = input.value.replace(/\D/g, '');
            if (val.length > 11) val = val.slice(0, 11);
            if (val.length > 2) val = val.replace(/^(\d{2})/, '($1) ');
            if (val.length > 7) val = val.replace(/(\d{5})(\d)/, '$1-$2');
            input.value = val;
        }

        // Lógica do Formulario Lead
        const leadForm = document.getElementById('lead-form');
        const leadModal = document.getElementById('lead-modal');
        const btnEntrar = document.getElementById('btn-entrar');

        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('lead-nome').value;
            const telefone = document.getElementById('lead-telefone').value.replace(/\D/g, '');
            const maiorIdade = document.getElementById('lead-18').checked;

            if (!maiorIdade || telefone.length < 10) return;

            btnEntrar.innerHTML = "CARREGANDO...";
            btnEntrar.disabled = true;

            // ====== FIX DEFINITIVO (MANTENDO A BASE INTACTA) ======
            // O Play dispara EXATAMENTE ao pressionar o botão de "Entrar na live".
            // ZERO som no formulário, só entra na live.
            const bgMusic = document.getElementById('bgMusic');
            if(bgMusic) {
                bgMusic.volume = 0.4;
                let playP = bgMusic.play();
                if(playP !== undefined) playP.catch(()=>{});
                
                // Removida a armadilha de recuo (onpause) que estava causando o bug
                // do áudio tremendo/travando no iOS quando tocava junto do vídeo!
                bgMusic.onpause = null; 
            }
            // ======================================================

            try {
                // Enviar para o n8n
                fetch('https://webhook.previas.shop/webhook/pegarlead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: nome,
                        telefone: telefone,
                        origem: 'Live_Entrada'
                    })
                });
            } catch (err) { }

            // Usa o nome digitado no chat automatico se ja nao tiver 
            if(!meuNome) meuNome = nome;

            // SALVANDO A SESSÃO NO NAVEGADOR: Garante que ele fique na live se recarregar a página!
            localStorage.setItem('jaEntrouNaLive', 'true');
            localStorage.setItem('meuNomeNaLive', meuNome);

            // Fechar modal
            leadModal.classList.add('animate__animated', 'animate__fadeOut');
            setTimeout(() => {
                leadModal.classList.add('hidden');
                
                // Toca a música e o vídeo depois que o modal fechar (MANTIDA BASE ORIGINAL EXATAMENTE IGUAL)
                video.muted = false;
                video.play().catch(e => console.log(e));
                
                if (bgMusic) {
                    bgMusic.volume = 0.4;
                    bgMusic.play().catch(e => console.log("Áudio bloqueado", e));
                }
                
                // Remove o botão manual de unmute pois a interacao do form ja permitiu som
                if(unmuteBtn) unmuteBtn.classList.add('hidden');

                // Carolzinha manda mensagem de boas vindas para o usuário ao entrar (Interação principal)
                setTimeout(() => {
                    enviarRespostaCarolzinha(`Oiiii @${meuNome.toLowerCase()}!! Acabei de ver que você entrou! Que delícia ter você na minha Live VIP amor! Fica bem à vontade tá? 🔥😈`);
                }, 2000);

                // Inicia ciclo de pop up 12s apos entrar
                let initialT = setTimeout(() => {
                    if(isLooping) popupLoop();
                }, 12000);
                loopTimers.push(initialT);

            }, 500);
        });

        // ====== RESTAURAR SESSÃO CASO RECARREGUE A PÁGINA (F5) OU SAIA SEM QUERER ======
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('jaEntrouNaLive') === 'true') {
                meuNome = localStorage.getItem('meuNomeNaLive') || "";
                const leadModal = document.getElementById('lead-modal');
                if (leadModal) leadModal.classList.add('hidden'); // Oculta o formulário imediatamente
                if (unmuteBtn) unmuteBtn.classList.add('hidden');
                
                // Reinicia ciclo de popups de vendas
                setTimeout(() => {
                    if(isLooping) popupLoop();
                }, 12000);

                // IMPORTANTE: Tenta dar play automático do vídeo, mas se o navegador travar o som (por causa do F5)...
                // Ele esconde o som e mostra seu botão de "Desmutar", pra garantir que pelo menos o vídeo continue rodando ao vivo!
                if (video) {
                    video.muted = false;
                    let vPlay = video.play();
                    if (vPlay !== undefined) {
                        vPlay.catch(() => {
                            video.muted = true; // Força no mudo se o Safari der erro pra garantir a imagem!
                            video.play().catch(()=>{});
                            if(unmuteBtn) unmuteBtn.classList.remove('hidden'); // Exibe seu unmuter original
                        });
                    }
                }

                // Religa as defesas da música e força tocar novamente de fundo
                const bgMusic = document.getElementById('bgMusic');
                if (bgMusic) {
                    bgMusic.volume = 0.4;
                    bgMusic.onpause = null; // Removido o onpause para anular o conflito de áudio travando
                    let mPlay = bgMusic.play();
                    if(mPlay !== undefined) mPlay.catch(()=>{});
                }

                // E a Carolzinha ainda manda uma indireta que o "fulano" voltou pra live hahaha!
                if(meuNome && meuNome !== "Visitante") {
                    setTimeout(() => {
                        enviarRespostaCarolzinha(`@${meuNome.toLowerCase()} amor, que bom que você continuou aqui na live!! Achou que eu não ia notar? Vem pro VIP! 🔥😈`);
                    }, 4000);
                }
            }
        });
        // ==============================================================================
    </script>
