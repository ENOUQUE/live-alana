<body class="bg-black text-white font-sans overflow-hidden h-[100dvh]">

                    <!-- Pacote Pink -->

                            <div class="text-pink-600 font-extrabold text-[12px] leading-tight">🔹 Pacote Pink</div>

                    <!-- Pacote Delírio -->
                    <button onclick="iniciarCheckout(this)" class="w-full bg-purple-50 border border-purple-200 p-1.5 rounded-lg hover:bg-purple-100 flex items-center justify-between">
                        <div class="text-left px-1">
                            <div class="text-purple-600 font-extrabold text-[12px] leading-tight">😈 Pacote Delírio</div>
                            <div class="text-[9px] text-gray-700 font-bold leading-tight mt-0.5">📸 75 fotos<br>🎥 60 vídeos</div>
                        </div>
                        <div class="bg-purple-600 text-white text-[10px] font-black px-2.5 py-1 rounded-full whitespace-nowrap">R$ 15,00</div>

                    <!-- Pacote VIP -->
                    <button onclick="iniciarCheckout(this)" class="w-full bg-yellow-50 border border-yellow-300 p-1.5 rounded-lg hover:bg-yellow-100 flex items-center justify-between shadow-sm">
                        <div class="text-left px-1">
                            <div class="text-yellow-600 font-extrabold text-[12px] leading-tight">👑 Pacote VIP</div>

    <script>

        const video = document.getElementById('mainVideo');

            "Robson_Top", "Fabricio_X", "Igor_123", "Kleber_M", "Leandro_F", "Mauricio_BR", "Nilton_C", "Otavio_M", "Pablo_Escobar_BR",

            "Comprei o pacote VIP agora!", "Me aceita lá no grupo!", "Top demais 😈", "Já estou lá na sala!", "A Carolzinha é perfeita",
            "Comprei o pacote Delírio e não me arrependo! 🥵", "Vale cada centavo, rapaziada!", "Alguém me empresta R$30 aí? 😅",
            "Pagamento aprovado aqui, só no aguardo 😈", "Que mulher, meu Deus! 😍", "O pacote Pink tá muito barato 😱",

            "Sério, melhor investimento da semana hahaha", "Acho que vou pegar o Pink pra testar 🔥", "Gente, os vídeos são Full HD mesmo? 👀",
            "Acabou de cair o acesso aqui, meu Deus! 🤤", "Misericórdia! Que conteúdo top! 👏", "Fazendo o pix agora mesmo...",
            "Qualquer um dos pacotes vale a pena, sério", "Carolzona maravilhosa ❤️‍🔥", "Não acredito que paguei só 30 reais nisso",
            "Onde eu clico pra comprar? Sumiu aqui", "Peguei o VIP pra não perder nada 😈", "Tá travando pra alguém ou é só aqui?",
            "Tô no 4G só pra assistir haha", "Alguém divide o pacote comigo? 😂", "Isso sim é promoção de verdade! 💥",
            "Meu Deus a última foto do pacote VIP... 🥵🥵", "Nunca comprei antes, mas dessa vez não resisti", "Carol, você é um espetáculo de mulher!",
            "Já comprei umas 3 vezes conteúdos dela, nunca decepciona 💯", "O pacote Pink já me deixou louco, imagina o VIP", 
            "Avisa lá no grupo que a live tá on", "Meu cartão não passou, vou fazer Pix! 💸", "Chegando agora, alguém resume o que tá rolando?",
            "Essa tabela salvou minha noite rs", "Comprei o pacote Delírio! Os vídeos tão insanos! 😈", "Ela responde no direct do VIP?",
            "Ansioso demais pra ver o pacote de 100 fotos", "Galera, não percam, acabei de abrir aqui e tá 10/10 😍", "Eu avisei que hoje ia ser brabo 🔥",
            "Qual pacote vcs recomendam pra quem tá liso? 😂", "Pix feito! Cadê meu acesso? 👀", "Libera logo Carol", 
            "Muito deusa pqp...", "Se soubesse que era tão bom tinha comprado antes"
        ];

        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                unmuteBtn.classList.add('hidden');
                
                // Toca a música de fundo (precisa do arquivo musica-nova.m4a na mesma pasta)
                const bgMusic = document.getElementById('bgMusic');
                if (bgMusic) {
                    bgMusic.volume = 0.4;
                    bgMusic.play().catch(e => console.log("Áudio bloqueado pelo navegador", e));
                }
            }
        }

        function addMessage() {
            const nome = nomes[Math.floor(Math.random() * nomes.length)];
            const msg = mensagens[Math.floor(Math.random() * mensagens.length)];
            const div = document.createElement('div');
            div.className = 'animate__animated animate__fadeInUp bg-white/5 p-2 rounded-lg';
            div.innerHTML = `<span class="text-pink-500 font-bold text-[11px]">@${nome.toLowerCase()}</span><p class="text-sm text-gray-200 leading-tight">${msg}</p>`;
            chatBox.prepend(div);
            if (chatBox.childNodes.length > 25) chatBox.removeChild(chatBox.lastChild);
        }

        let meuNome = "";
        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if (!txt) return;

            if (!meuNome) {
                meuNome = prompt("Como você quer ser chamado na live?");
                if (!meuNome) meuNome = "Visitante";
            }

            const div = document.createElement('div');
            div.className = 'animate__animated animate__fadeInUp bg-pink-600/30 border border-pink-500/50 p-2 rounded-lg';
            div.innerHTML = `<span class="text-pink-300 font-bold text-[11px]">@${meuNome.toLowerCase()} (Você)</span><p class="text-sm text-white font-medium leading-tight">${txt}</p>`;
            chatBox.prepend(div);
            
            if (chatBox.childNodes.length > 25) chatBox.removeChild(chatBox.lastChild);
            
            input.value = "";
        }

        function updateViewers() {
            let current = parseInt(viewerCount.innerText.replace('.', ''));
            let change = Math.floor(Math.random() * 20) - 10;
            viewerCount.innerText = (current + change).toLocaleString('pt-BR');
        }

        // Lógica de Checkout e Integração
        async function iniciarCheckout(btn) {
            if(btn) {
                btn.innerHTML = `<span class="animate-pulse">PROCESSANDO...</span>`;
                btn.disabled = true;
            }

            try {
                // 1. Notifica o n8n sobre o clique (Gera Lead/Pix)
                fetch('https://webhook.previas.shop/webhook/webhook-gerar-pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instancia: 'pluszap',
                        origem: 'Live_VIP_Hot',
                        url_entrega: 'https://alana-valentine.vercel.app/'
                    })
                });

                // 2. Pequeno delay para "fingir" processamento real
                setTimeout(() => {
                    // Redireciona para o gerador de PIX da EFI na Vercel
                    window.location.href = "https://carolvip.vercel.app/";
                }, 1500);

            } catch (e) {
                window.location.href = "https://carolvip.vercel.app/";
            }
        }

        setInterval(addMessage, 1800);
        setInterval(updateViewers, 3000);

        // POP-UP AP�S 12 SEGUNDOS
        let loopTimers = [];
        let isLooping = true; // Permite desativar loop quando clicado pelo usuario

        function togglePopup() {
            if (salePopup.classList.contains('hidden') || salePopup.classList.contains('animate__zoomOut')) {
                // Clique manual: abre e pausa o loop escondido
                isLooping = false;
                loopTimers.forEach(t => clearTimeout(t));
                salePopup.classList.remove('hidden', 'animate__zoomOut');
                salePopup.classList.add('animate__zoomIn');
            } else {
                fecharPopup();
            }
        }

        function fecharPopup() {
            salePopup.classList.replace('animate__zoomIn', 'animate__zoomOut');
            setTimeout(() => {
                salePopup.classList.add('hidden');
            }, 500); 
        }

        function popupLoop() {
            if(!isLooping) return;
            // Abre o pop-up
            if (salePopup.classList.contains('hidden') || salePopup.classList.contains('animate__zoomOut')) {
                salePopup.classList.remove('hidden', 'animate__zoomOut');
                salePopup.classList.add('animate__zoomIn');
            }
            
            // Fecha após 20 segundos
            let t1 = setTimeout(() => {
                if(isLooping) fecharPopup();
                
                // Recomeça ciclo após 35 segundos fechado
                let t2 = setTimeout(() => {
                    popupLoop();
                }, 35000);
                loopTimers.push(t2);
            }, 20000);
            loopTimers.push(t1);
        }

        // Inicia ciclo de pop up 12s apos carregamento
        let initialT = setTimeout(() => {
            if(isLooping) popupLoop();
        }, 12000);
        loopTimers.push(initialT);
    </script>
</body>

</html>
